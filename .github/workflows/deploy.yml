name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      # Upload dist/ as-is. Astro emits files flat (dist/index.html,
      # dist/posts/<slug>/index.html), and the HTML's internal hrefs all
      # carry the /blog/ prefix thanks to base='/blog'. GH Pages serves
      # at <user>.github.io/<repo>/, and Nginx proxies wzmn.net/blog/* to
      # that after stripping the /blog/ prefix, so paths align.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
